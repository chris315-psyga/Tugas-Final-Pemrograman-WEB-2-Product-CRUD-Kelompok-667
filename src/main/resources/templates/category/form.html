<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 th:text="${category.id != null} ? 'Edit Kategori' : 'Tambah Kategori Baru'" class="mb-4">Form Kategori</h2>

            <form th:action="@{/categories/save}" th:object="${category}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="name" class="form-label">Nama Kategori</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}"
                           placeholder="Misal: Elektronik, Pakaian" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Deskripsi</label>
                    <textarea class="form-control" id="description" th:field="*{description}"
                              rows="3" placeholder="Berikan deskripsi singkat..."></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Simpan Kategori</button>
                    <a th:href="@{/categories}" class="btn btn-secondary">Batal</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
