<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Kategori Saya</h2>
        <a th:href="@{/categories/new}" class="btn btn-primary">
            + Tambah Kategori Baru
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>No</th>
            <th>Nama Kategori</th>
            <th>Deskripsi</th>
            <th>Aksi</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category, iterStat : ${categories}">
            <td th:text="${iterStat.index + 1}">1</td>
            <td th:text="${category.name}">Nama Kategori</td>
            <td th:text="${category.description}">Deskripsi</td>
            <td>
                <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-warning btn-sm">Edit</a>
                <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Yakin ingin menghapus kategori ini? Produk dengan kategori ini mungkin akan error.');">
                    <button type="submit" class="btn btn-danger btn-sm">Hapus</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(categories)}" class="text-center py-5">
        <p class="text-muted">Belum ada kategori.</p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
