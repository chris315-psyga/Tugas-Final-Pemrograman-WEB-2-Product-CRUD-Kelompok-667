<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Produk</h2>
        <a th:href="@{/products/new}" class="btn btn-success">+ Tambah Produk Baru</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- SEARCH & FILTER FORM -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/products}" method="get" class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label for="keyword" class="form-label fw-bold">🔍 Cari Produk</label>
                    <input type="text" class="form-control" id="keyword" name="keyword" th:value="${keyword}" placeholder="Ketik nama produk...">
                </div>
                <div class="col-md-5">
                    <label for="category" class="form-label fw-bold">📁 Filter Kategori</label>
                    <select class="form-select" id="category" name="categoryId">
                        <option value="">-- Semua Kategori --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${categoryId != null and cat.id == categoryId}"></option>
                    </select>
                </div>
                <div class="col-md-2 d-grid gap-2">
                    <button type="submit" class="btn btn-primary">🔍 Cari</button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm">↺ Reset</a>
                </div>
            </form>
        </div>
    </div>

    <!-- INFO TOTAL DATA -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0">
            Showing <strong th:text="${startItem}">1</strong> to <strong th:text="${endItem}">10</strong> of <strong th:text="${totalItems}">0</strong> entries
        </p>
    </div>

    <!-- PRODUCT TABLE -->
    <div th:if="${!#lists.isEmpty(products)}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product, iterStat : ${products}">
                <td th:text="${currentPage * 10 + iterStat.index + 1}">1</td>
                <td th:text="${product.name}">Nama Produk</td>
                <td th:text="${product.category?.name}">Kategori</td>
                <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                <td th:text="${product.stock}">0</td>
                <td>
                    <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                    <span th:unless="${product.active}" class="badge bg-danger">Tidak Aktif</span>
                </td>
                <td>
                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:inline;" onsubmit="return confirm('Yakin hapus?');">
                        <button type="submit" class="btn btn-danger btn-sm">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- PAGINATION CONTROLS -->
        <nav>
            <ul class="pagination justify-content-center">
                <!-- Previous Button -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId})}">Previous</a>
                </li>

                <!-- Page Numbers -->
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${categoryId})}" th:text="${i + 1}">1</a>
                </li>

                <!-- Next Button -->
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <p class="text-muted fs-5 mb-2">📦 Tidak ada produk ditemukan</p>
        <a th:href="@{/products/new}" class="btn btn-primary mt-2">+ Tambah Produk Pertama</a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
