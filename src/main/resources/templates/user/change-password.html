<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h4>Ganti Password</h4>
                </div>
                <div class="card-body">
                    <!-- Error Message -->
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/profile/change-password}"
                          th:object="${changePasswordRequest}"
                          method="post">

                        <!-- Password Lama -->
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label">Password Lama</label>
                            <input type="password" class="form-control" id="oldPassword"
                                   th:field="*{oldPassword}"
                                   placeholder="Masukkan password lama" required autofocus>
                        </div>

                        <!-- Password Baru -->
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Password Baru</label>
                            <input type="password" class="form-control" id="newPassword"
                                   th:field="*{newPassword}"
                                   placeholder="Masukkan password baru" required>
                        </div>

                        <!-- Konfirmasi Password Baru -->
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Konfirmasi Password Baru</label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   th:field="*{confirmPassword}"
                                   placeholder="Ulangi password baru" required>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Ganti Password</button>
                            <a th:href="@{/profile}" class="btn btn-secondary">Batal</a>
                        </div>

                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <small class="text-muted">
                    Pastikan password baru memiliki kombinasi huruf dan angka untuk keamanan.
                </small>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
