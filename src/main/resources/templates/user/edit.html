<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h4>Edit Profil</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/update}" th:object="${currentUser}" method="post">

                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{username}"> <!-- Username biasanya tidak boleh diubah -->

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="fullName" class="form-label">Nama Lengkap</label>
                            <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="contoh@email.com">
                        </div>

                        <!-- Phone Number -->
                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label">Nomor HP</label>
                            <input type="text" class="form-control" id="phoneNumber" th:field="*{phoneNumber}">
                        </div>

                        <!-- Address -->
                        <div class="mb-3">
                            <label for="address" class="form-label">Alamat</label>
                            <textarea class="form-control" id="address" th:field="*{address}" rows="2"></textarea>
                        </div>

                        <!-- Bio -->
                        <div class="mb-3">
                            <label for="bio" class="form-label">Bio Singkat</label>
                            <textarea class="form-control" id="bio" th:field="*{bio}" rows="3"></textarea>
                        </div>

                        <!-- Profile Image URL -->
                        <div class="mb-3">
                            <label for="profileImageUrl" class="form-label">URL Gambar Profil</label>
                            <input type="text" class="form-control" id="profileImageUrl" th:field="*{profileImageUrl}"
                                   placeholder="https://...">
                            <small class="text-muted">Masukkan URL gambar (misalnya link dari Google Images)</small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">Simpan Perubahan</button>
                            <a th:href="@{/profile}" class="btn btn-secondary">Batal</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
